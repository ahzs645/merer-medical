name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute Pages base href
        id: pages
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            echo "base_href=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_href=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web app
        run: npm exec nx -- build web --base-href="${{ steps.pages.outputs.base_href }}"

      - name: Add GitHub Pages static fallbacks
        shell: bash
        run: |
          cp dist/apps/web/index.html dist/apps/web/404.html
          mkdir -p dist/apps/web/api/v1
          printf '{}' > dist/apps/web/api/v1/instance-config
          touch dist/apps/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
